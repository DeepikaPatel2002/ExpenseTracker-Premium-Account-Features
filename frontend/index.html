<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h2>Expense Tracker Dashboard</h2>

    <button id="showLeaderboard">Leaderboard</button>
    <button id="downloadBtn">Download Report (Premium)</button>
    <button id="logoutBtn">Logout</button>
    <button id="upgradeBtn">Upgrade to Premium</button>
  </div>

  <!-- FILTERS -->
  <h2>Report Dashboard</h2>

  <div id="filter-bar">
   <button onclick="setFilter('all')" id="filter-all">All</button>
  <button onclick="setFilter('daily')" id="filter-daily">Daily</button>
   <button onclick="setFilter('weekly')" id="filter-weekly">Weekly</button>
   <button onclick="setFilter('monthly')" id="filter-monthly">Monthly</button>
  </div>

  <br>

  <!-- SUMMARY -->
  <div class="summary">
    <div class="card income">
      <h3>Income</h3>
      <p id="totalIncome">₹0</p>
    </div>

    <div class="card expense">
      <h3>Expense</h3>
      <p id="totalExpense">₹0</p>
    </div>

    <div class="card balance">
      <h3>Balance</h3>
      <p id="balance">₹0</p>
    </div>
  </div>

  <br>

  <!-- FORM -->
  <form id="expenseForm">
    <input type="number" id="amount" placeholder="Amount" required><br><br>
    <input type="text" id="description" placeholder="Description" required><br><br>

    <!--  NEW FIELD -->
    <input type="text" id="note" placeholder="Note (optional)"><br><br>

    <button type="submit">Add</button>
  </form>

  <br>

  <!-- TABLE -->
  <table border="1">
    <thead>
      <tr>
        <th>Amount</th>
        <th>Category</th>
        <th>Description</th>
        <th>Note</th> <!-- NEW -->
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="expense-list"></tbody>
  </table>

  <br>

  <!-- PAGINATION -->
  <div id="pagination" style="text-align:center; margin-top:15px;">
    <button id="prevBtn">Prev</button>
    <span id="pageInfo" style="margin: 0 10px;"></span>
    <button id="nextBtn">Next</button>
  </div>

  <br>

  <!-- PAGE SIZE -->
  <div style="text-align:center;">
    <label>Items per page: </label>
    <select id="limitSelect">
      <option value="5">5</option>
      <option value="10" selected>10</option>
      <option value="20">20</option>
      <option value="40">40</option>
    </select>
  </div>

  <br>

  <!-- LEADERBOARD -->
  <h3>Leaderboard</h3>

  <table border="1">
    <thead>
      <tr>
        <th>Rank</th>
        <th>User</th>
        <th>Total Expense</th>
      </tr>
    </thead>

    <tbody id="leaderboard-body"></tbody>
  </table>

  <script src="index.js"></script>

</body>
</html>
