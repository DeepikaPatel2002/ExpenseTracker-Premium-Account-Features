<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h2>Expense Tracker Dashboard</h2>

    <button id="showLeaderboard">Leaderboard</button>

    <button id="downloadBtn">Download Report</button>

    <button id="logoutBtn">Logout</button>

    <button id="upgradeBtn">Upgrade to Premium</button>
  </div>

  <!-- FILTERS -->
  <h2>Report Dashboard</h2>

  <div id="filter-bar">
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('daily')">Daily</button>
    <button onclick="setFilter('weekly')">Weekly</button>
    <button onclick="setFilter('monthly')">Monthly</button>
  </div>

  <br>

  <!-- SUMMARY -->
  <div class="summary">
    <div class="card income">
      <h3>Income</h3>
      <p id="totalIncome">₹0</p>
    </div>

    <div class="card expense">
      <h3>Expense</h3>
      <p id="totalExpense">₹0</p>
    </div>

    <div class="card balance">
      <h3>Balance</h3>
      <p id="balance">₹0</p>
    </div>
  </div>

  <br>

  <!-- FORM -->
  <form id="expenseForm">
    <input type="number" id="amount" placeholder="Amount" required><br><br>
    <input type="text" id="description" placeholder="Description" required><br><br>
    <button type="submit">Add</button>
  </form>

  <br>

  <!-- TABLE -->
  <table border="1">
    <thead>
      <tr>
        <th>Amount</th>
        <th>Category</th>
        <th>Description</th>
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="expense-list"></tbody>
  </table>

  <!-- LEADERBOARD -->
  <h3>Leaderboard</h3>
  <table border="1">
    <thead>
      <tr>
        <th>Rank</th>
        <th>User</th>
        <th>Total Expense</th>
      </tr>
    </thead>
    <tbody id="leaderboard-body"></tbody>
  </table>

  <script src="index.js"></script>

</body>
</html>
