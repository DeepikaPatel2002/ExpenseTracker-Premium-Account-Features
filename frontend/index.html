<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <!-- Link external CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h2 id="welcomeMessage">Welcome, King! Thank you for being a Premium Member!</h2>
    <button id="showLeaderboard">Show Leaderboard</button>
    <button id="downloadBtn">Download Report</button>
    <button id="logoutBtn">Logout</button>
    <button id="upgradeBtn">Upgrade to Premium</button>
  </div>

  <form id="expenseForm">
    <input type="number" id="amount" placeholder="Enter amount" required><br><br>
    <input type="text" id="description" placeholder="Enter description" required><br><br>
    <input type="text" id="category" placeholder="Enter category" required><br><br>
    <button type="submit" class="primary-btn">Add Expense</button>
  </form>

  <h3>Expenses</h3>
  <table>
    <thead>
      <tr>
        <th>Amount</th>
        <th>Category</th>
        <th>Description</th>
        <th>Date</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="expense-list"></tbody>
  </table>

  <h3>Leader Board</h3>
  <table id="leaderboard">
    <thead>
      <tr>
        <th>Rank</th>
        <th>User</th>
        <th>Total Expense</th>
      </tr>
    </thead>
    <tbody id="leaderboard-body"></tbody>
  </table>

  <script src="index.js"></script>
</body>
</html>
